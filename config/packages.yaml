# Package Installation Configuration
# Defines packages to install and their installation methods

packages:
  neovim:
    description: "Hyperextensible Vim-based text editor"
    optional: true
    installers:
      darwin:
        method: homebrew
        package: neovim
      linux:
        method: apt
        package: neovim
    post_install:
      - action: create_directory
        path: ~/.config/nvim
        
  nodejs:
    description: "JavaScript runtime built on Chrome's V8 engine"
    optional: true
    installers:
      darwin:
        method: homebrew
        package: node
      linux:
        method: apt
        packages:
          - nodejs
          - npm

  tree:
    description: "Recursive directory listing program"
    installers:
      darwin:
        method: homebrew
        package: tree
      linux:
        method: apt
        package: tree

  zoxide:
    description: "Smarter cd command"
    installers:
      darwin:
        method: homebrew
        package: zoxide
      linux:
        method: script
        url: "https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh"

  rbenv:
    description: "Groom your app's Ruby environment"
    installers:
      darwin:
        method: homebrew
        package: rbenv
      linux:
        method: apt
        package: rbenv

  bat:
    description: "A cat(1) clone with wings"
    installers:
      darwin:
        method: homebrew
        package: bat
      linux:
        method: apt
        package: bat

  pyenv:
    description: "Python version management"
    installers:
      darwin:
        method: homebrew
        package: pyenv
      linux:
        method: script
        url: "https://pyenv.run"

  gcloud-cli:
    description: "Google Cloud CLI"
    installers:
      darwin:
        method: homebrew_cask
        package: gcloud-cli

oh_my_zsh:
  description: "Oh My Zsh installation"
  install_command: 'sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended'

oh_my_zsh_plugins:
  description: "Zsh plugins and themes"
  optional: true
  custom_installer: install_oh_my_zsh_plugins
  plugins:
    - name: zsh-autosuggestions
      url: https://github.com/zsh-users/zsh-autosuggestions.git
      path: plugins/zsh-autosuggestions
    - name: zsh-syntax-highlighting
      url: https://github.com/zsh-users/zsh-syntax-highlighting.git
      path: plugins/zsh-syntax-highlighting
  themes:
    - name: powerlevel10k
      url: https://github.com/romkatv/powerlevel10k.git
      path: themes/powerlevel10k
      clone_args: ["--depth=1"]

# Package manager configurations
package_managers:
  homebrew:
    check_command: ["brew", "--version"]
    install_command: ["brew", "install"]
    update_command: ["brew", "update"]
  
  homebrew_cask:
    check_command: ["brew", "--version"]
    install_command: ["brew", "install", "--cask"]

  apt:
    check_command: ["apt", "--version"]
    install_command: ["sudo", "apt", "install", "-y"]
    update_command: ["sudo", "apt", "update"]
